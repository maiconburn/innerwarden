[module]
id          = "nginx-error-monitor"
name        = "Nginx Error Monitor"
version     = "0.1.0"
description = "Tails nginx error.log and detects automated web scans, path traversal probes, and LFI attempts via sliding window analysis"
authors     = ["InnerWarden Contributors"]
license     = "Apache-2.0"
tier        = "open"
builtin     = true
min_innerwarden = "0.1.0"

[provides]
collectors = ["nginx-error-log"]
detectors  = ["web-scan"]
skills     = []

[requires]
event_sources = []

[security]
allowed_commands     = []
require_sudo_validation = false
forbid_shell_expansion  = true

[[preflights]]
kind   = "binary_exists"
value  = "/usr/sbin/nginx"
reason = "nginx must be installed"
