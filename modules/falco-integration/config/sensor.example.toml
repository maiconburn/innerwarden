# Falco integration — sensor config snippet
#
# 1. Install Falco: https://falco.org/docs/getting-started/installation/
# 2. Enable JSON output in /etc/falco/falco.yaml:
#
#      json_output: true
#      json_include_output_property: true
#      file_output:
#        enabled: true
#        keep_alive: false
#        filename: /var/log/falco/falco.log
#
# 3. Restart Falco: sudo systemctl restart falco
# 4. Add the section below to your sensor config.toml

[collectors.falco_log]
enabled = true
path    = "/var/log/falco/falco.log"
