builtin     = true
enables     = []

[[modules]]
id          = "slack-notify"
name        = "Slack Notify"
version     = "0.1.0"
description = "Sends incident alerts to a Slack channel via Incoming Webhook — Block Kit messages with severity badge, summary, and optional dashboard deep-link"
tags        = ["slack", "notifications", "alerting"]
tier        = "open"
builtin     = true
enables     = []

