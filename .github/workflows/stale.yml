name: Mark stale issues and PRs

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days. It will be closed in 14 days
            unless there is new activity. If this is still relevant, please leave a
            comment or remove the stale label.
          stale-pr-message: >
            This pull request has been inactive for 30 days. It will be closed in
            14 days unless there is new activity. If you are still working on this,
            please leave a comment or remove the stale label.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen if you resume work on this.
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "pinned,security,good first issue"
          exempt-pr-labels: "pinned,security"
